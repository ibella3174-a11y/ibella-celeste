<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celeste | Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial Black', Gadget, sans-serif; }
        body { background-color: #000000; color: #ffffff; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        
        .header-container { text-align: center; margin-bottom: 30px; }
        .logo-img { width: 120px; height: auto; display: block; margin: 0 auto 10px; }
        .brand-name { color: #00ff00; font-size: 38px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; }

        .login-card {
            background-color: #080808; width: 100%; max-width: 400px;
            padding: 35px 25px; border-radius: 30px; border: 1px solid #1a1a1a;
            box-shadow: 0 0 40px rgba(0, 255, 0, 0.05);
        }
        .card-title { text-align: center; font-size: 18px; letter-spacing: 1px; margin-bottom: 30px; font-family: sans-serif; font-weight: 800; }

        .input-group { margin-bottom: 18px; }
        label { display: block; font-size: 13px; font-weight: 600; color: #fff; margin-bottom: 8px; font-family: sans-serif; }
        input {
            width: 100%; background-color: #0e110e; border: 1px solid #1c221c; border-radius: 14px;
            padding: 16px; color: white; font-size: 14px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: #00ff00; background-color: #121812; }

        .btn-login {
            width: 100%; background: #00ff00; color: #000; border: none; padding: 18px;
            border-radius: 15px; font-weight: 900; font-size: 18px; cursor: pointer;
            margin-top: 15px; text-transform: uppercase; box-shadow: 0 4px 15px rgba(0, 255, 0, 0.3);
        }

        .footer-link {
            text-align: center; margin-top: 25px; font-family: sans-serif; font-size: 14px; color: #777;
        }
        .footer-link a { color: #00ff00; text-decoration: none; font-weight: bold; }
        .chat-icon {
            position: fixed; bottom: 30px; left: 30px;
            background: linear-gradient(135deg, #00aaff, #00ff00);
            width: 58px; height: 58px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 26px; text-decoration: none;
            box-shadow: 0 0 15px rgba(0, 204, 255, 0.5);
        }
    </style>
</head>
<body>

    <div class="header-container">
        <img src="logo.png" alt="Celeste Logo" class="logo-img">
        <div class="brand-name">CELESTE</div>
    </div>

    <div class="login-card">
        <h2 class="card-title">WELCOME BACK</h2>
        
        <form action="dashboard.html" method="POST">
            <div class="input-group">
                <label>Username or Email</label>
                <input type="text" name="identifier" placeholder="Enter your username" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>
            
            <button type="submit" class="btn-login">Login to Account</button>
        </form>

        <div class="footer-link">
            Don't have an account? <a href="register.html">Register here</a>
        </div>
    </div>

    <a href="https://t.me/+Qs8a8Kwer-5kMTU0" class="chat-icon">💬</a>

</body>
</html>
